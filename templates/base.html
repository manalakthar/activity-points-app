<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Activity Points Tracker{% endblock %} — SJEC</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f4f8;
            color: #1a202c;
            min-height: 100vh;
        }

        /* Navigation */
        nav {
            background: #1a365d;
            padding: 0 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .nav-logo {
            width: 36px;
            height: 36px;
            background: #3182ce;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: white;
            font-size: 16px;
        }

        .nav-title {
            color: white;
            font-weight: 600;
            font-size: 16px;
        }

        .nav-subtitle {
            color: #90cdf4;
            font-size: 12px;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-link {
            color: #bee3f8;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s;
        }

        .nav-link:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .nav-link.logout {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .nav-link.logout:hover {
            background: #e53e3e;
        }

        /* Main content */
        main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        /* Cards */
        .card {
            background: white;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            margin-bottom: 24px;
        }

        .card-header {
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #e2e8f0;
        }

        .card-title {
            font-size: 20px;
            font-weight: 600;
            color: #1a202c;
        }

        .card-subtitle {
            font-size: 14px;
            color: #718096;
            margin-top: 4px;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            text-decoration: none;
            gap: 8px;
        }

        .btn-primary {
            background: #3182ce;
            color: white;
        }

        .btn-primary:hover {
            background: #2b6cb0;
        }

        .btn-success {
            background: #38a169;
            color: white;
        }

        .btn-success:hover {
            background: #2f855a;
        }

        .btn-danger {
            background: #e53e3e;
            color: white;
        }

        .btn-danger:hover {
            background: #c53030;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #3182ce;
            color: #3182ce;
        }

        .btn-outline:hover {
            background: #3182ce;
            color: white;
        }

        .btn-full {
            width: 100%;
        }

        /* Form elements */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #4a5568;
            margin-bottom: 6px;
        }

        .form-control {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            color: #1a202c;
            transition: border-color 0.2s;
            background: white;
        }

        .form-control:focus {
            outline: none;
            border-color: #3182ce;
            box-shadow: 0 0 0 3px rgba(49,130,206,0.1);
        }

        select.form-control {
            cursor: pointer;
        }

        /* Alerts */
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .alert-error {
            background: #fff5f5;
            color: #c53030;
            border: 1px solid #feb2b2;
        }

        .alert-success {
            background: #f0fff4;
            color: #276749;
            border: 1px solid #9ae6b4;
        }

        .alert-warning {
            background: #fffaf0;
            color: #c05621;
            border: 1px solid #fbd38d;
        }

        /* Badges */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-pending {
            background: #fefcbf;
            color: #b7791f;
        }

        .badge-approved {
            background: #f0fff4;
            color: #276749;
        }

        .badge-rejected {
            background: #fff5f5;
            color: #c53030;
        }

        .badge-mentor {
            background: #ebf8ff;
            color: #2b6cb0;
        }

        .badge-coordinator {
            background: #e9d8fd;
            color: #553c9a;
        }

        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th {
            text-align: left;
            padding: 12px 16px;
            background: #f7fafc;
            color: #4a5568;
            font-weight: 600;
            border-bottom: 2px solid #e2e8f0;
        }

        td {
            padding: 12px 16px;
            border-bottom: 1px solid #e2e8f0;
            color: #2d3748;
        }

        tr:hover td {
            background: #f7fafc;
        }

        /* Progress bar */
        .progress-container {
            background: #e2e8f0;
            border-radius: 999px;
            height: 12px;
            overflow: hidden;
            margin: 8px 0;
        }

        .progress-bar {
            height: 100%;
            border-radius: 999px;
            background: linear-gradient(90deg, #3182ce, #63b3ed);
            transition: width 0.5s ease;
        }

        .progress-bar.complete {
            background: linear-gradient(90deg, #38a169, #68d391);
        }

        /* Stats grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            border-left: 4px solid #3182ce;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #1a202c;
        }

        .stat-label {
            font-size: 13px;
            color: #718096;
            margin-top: 4px;
        }

        /* Page header */
        .page-header {
            margin-bottom: 24px;
        }

        .page-title {
            font-size: 24px;
            font-weight: 700;
            color: #1a202c;
        }

        .page-subtitle {
            font-size: 14px;
            color: #718096;
            margin-top: 4px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            nav {
                padding: 0 16px;
            }
            main {
                padding: 16px;
            }
            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

{% if session.get('user_id') %}
<nav>
    <a href="/" class="nav-brand">
        <div class="nav-logo">SAP</div>
        <div>
            <div class="nav-title">Activity Points Tracker</div>
            <div class="nav-subtitle">St Joseph Engineering College</div>
        </div>
    </a>
    <div class="nav-links">
        <span class="nav-link">👋 {{ session.get('name') }}</span>
        <a href="/logout" class="nav-link logout">Logout</a>
    </div>
</nav>
{% endif %}

<main>
    {% block content %}{% endblock %}
</main>

{% block extra_js %}{% endblock %}
</body>
</html>
